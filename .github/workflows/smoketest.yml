name: Smoke Test

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  diff-full-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install delta-build
        run: ./eng/install-local.sh 0.0.0-${GITHUB_SHA::7}

      - name: Diff
        run: delta-build diff --base ${{ github.event.pull_request.base.sha }} --explain --detailed

  diff-shallow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install delta-build
        run: ./eng/install-local.sh 0.0.0-${GITHUB_SHA::7}

      - name: Fetch base commit
        run: git fetch --depth=1 origin ${{ github.event.pull_request.base.sha }}

      - name: Diff
        run: delta-build diff --base ${{ github.event.pull_request.base.sha }} --explain --detailed

  diff-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install delta-build
        run: ./eng/install-local.sh 0.0.0-${GITHUB_SHA::7}

      - name: Restore snapshot cache
        uses: actions/cache@v5
        with:
          path: .delta-build-cache
          key: delta-build-snapshots-${{ github.event.pull_request.base.sha }}
          restore-keys: |
            delta-build-snapshots-

      - name: Fetch base commit
        run: git fetch --depth=1 origin ${{ github.event.pull_request.base.sha }}

      - name: Diff
        run: delta-build diff --base ${{ github.event.pull_request.base.sha }} --cache .delta-build-cache --explain --detailed
