name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore /p:Version=${GITHUB_REF_NAME#v} /p:ContinuousIntegrationBuild=true /p:EmbedUntrackedSources=true

      - name: Run tests
        run: dotnet test -c Release --no-build

      - name: Pack
        run: dotnet pack src/delta-build/delta-build.csproj -c Release /p:Version=${GITHUB_REF_NAME#v} /p:ContinuousIntegrationBuild=true /p:EmbedUntrackedSources=true --output nupkg --no-build

      - name: Publish to NuGet
        run: dotnet nuget push nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
